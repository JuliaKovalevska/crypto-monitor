name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted 

    steps:
      - name: Завантаження нового коду
        uses: actions/checkout@v4

      - name: Перезапуск Docker-контейнерів
        run: |
          docker-compose down
          docker-compose up -d --build